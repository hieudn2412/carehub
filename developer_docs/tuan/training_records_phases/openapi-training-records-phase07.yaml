openapi: 3.0.3
info:
  title: CareHub Training Records Phase 07 API
  version: 1.0.0
  description: Legacy Excel import preview, cleanup, and apply endpoints for training records.
servers:
  - url: http://localhost:8080/api/v1
security:
  - bearerAuth: []
paths:
  /training/imports/legacy:
    get:
      summary: List legacy training import batches
      tags: [Training Legacy Import]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Import batches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingImportBatchPageResponse'
  /training/imports/legacy/{batchId}:
    get:
      summary: Get a legacy training import batch with row preview data
      tags: [Training Legacy Import]
      parameters:
        - $ref: '#/components/parameters/BatchId'
      responses:
        '200':
          description: Batch detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingImportBatchApiResponse'
  /training/imports/legacy/preview:
    post:
      summary: Upload and preview a legacy Excel import file
      tags: [Training Legacy Import]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, activityTypeId]
              properties:
                file:
                  type: string
                  format: binary
                activityTypeId:
                  type: integer
                  format: int64
                professionalFieldId:
                  type: integer
                  format: int64
      responses:
        '200':
          description: Persisted preview batch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingImportBatchApiResponse'
        '400':
          description: Invalid file or import input
  /training/imports/legacy/{batchId}/apply:
    post:
      summary: Commit valid rows and confirmed warning rows into training records
      tags: [Training Legacy Import]
      parameters:
        - $ref: '#/components/parameters/BatchId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingImportApplyRequest'
      responses:
        '200':
          description: Batch after apply
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingImportBatchApiResponse'
  /training/imports/legacy/duration/parse:
    get:
      summary: Parse a legacy duration string without creating an import row
      tags: [Training Legacy Import]
      parameters:
        - name: rawText
          in: query
          required: true
          schema:
            type: string
          examples:
            hourMinute:
              value: 2h30
            lesson:
              value: 2 tiết
      responses:
        '200':
          description: Duration parse result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingDurationParseApiResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    BatchId:
      name: batchId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    TrainingImportApplyRequest:
      type: object
      properties:
        commitWarnings:
          type: boolean
          description: When true, commit every WARNING row that has not been imported yet.
        confirmedRowIds:
          type: array
          items:
            type: integer
            format: int64
          description: WARNING row IDs approved by a manager/admin for commit.
    TrainingDurationParse:
      type: object
      properties:
        rawText:
          type: string
        parsedValue:
          type: number
          nullable: true
        parsedUnit:
          type: string
          nullable: true
          enum: [HOUR, LESSON, CREDIT, DAY, MONTH, YEAR, OTHER]
        normalizedHours:
          type: number
          nullable: true
        confidence:
          type: number
        warningMessages:
          type: array
          items:
            type: string
        parsed:
          type: boolean
        autoCommittable:
          type: boolean
    TrainingImportRow:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sourceRowNumber:
          type: integer
        validationStatus:
          type: string
          enum: [VALID, WARNING, INVALID, IMPORTED, SKIPPED]
        rawData:
          type: object
          additionalProperties: true
        normalizedData:
          type: object
          additionalProperties: true
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        trainingRecordId:
          type: integer
          format: int64
          nullable: true
    TrainingImportBatch:
      type: object
      properties:
        id:
          type: integer
          format: int64
        originalFilename:
          type: string
        status:
          type: string
          enum: [PENDING, PROCESSING, COMPLETED, FAILED, COMPLETED_WITH_WARNINGS]
        totalRows:
          type: integer
        successRows:
          type: integer
        failedRows:
          type: integer
        warningRows:
          type: integer
        importedByUserId:
          type: integer
          format: int64
        importedAt:
          type: string
          format: date-time
        rows:
          type: array
          items:
            $ref: '#/components/schemas/TrainingImportRow'
    TrainingImportBatchApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/TrainingImportBatch'
    TrainingDurationParseApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/TrainingDurationParse'
    TrainingImportBatchPageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/TrainingImportBatch'
            page:
              type: integer
            size:
              type: integer
            totalElements:
              type: integer
              format: int64
            totalPages:
              type: integer
