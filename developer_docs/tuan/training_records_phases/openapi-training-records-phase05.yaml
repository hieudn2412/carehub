openapi: 3.0.3
info:
  title: CareHub Training Records Phase 05 API
  version: phase05
paths:
  /api/v1/training/requirements:
    get:
      summary: List training requirements
      security:
        - bearerAuth: []
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
        - name: departmentId
          in: query
          schema:
            type: integer
            format: int64
        - name: jobPositionId
          in: query
          schema:
            type: integer
            format: int64
        - name: professionalFieldId
          in: query
          schema:
            type: integer
            format: int64
        - name: effectiveOn
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            example: updatedAt,desc
      responses:
        '200':
          description: Requirements page
        '403':
          description: Admin role required
    post:
      summary: Create a training requirement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequirementFormRequest'
      responses:
        '200':
          description: Created requirement
        '409':
          description: Duplicate code or overlapping active requirement
        '422':
          description: Validation error
  /api/v1/training/requirements/{id}:
    get:
      summary: Get a training requirement
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequirementId'
      responses:
        '200':
          description: Requirement detail
        '404':
          description: Requirement not found
    put:
      summary: Update a training requirement
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequirementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequirementFormRequest'
      responses:
        '200':
          description: Updated requirement
        '409':
          description: Stale version, duplicate code, or overlapping active requirement
  /api/v1/training/requirements/{id}/status:
    patch:
      summary: Activate or deactivate a training requirement
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequirementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequirementStatusRequest'
      responses:
        '200':
          description: Updated status
  /api/v1/training/status/me:
    get:
      summary: Get current actor training compliance status
      security:
        - bearerAuth: []
      parameters:
        - name: professionalFieldId
          in: query
          schema:
            type: integer
            format: int64
        - name: asOf
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Personal training status
  /api/v1/training/employees/{employeeId}/status:
    get:
      summary: Get an employee training compliance status within actor scope
      security:
        - bearerAuth: []
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: professionalFieldId
          in: query
          schema:
            type: integer
            format: int64
        - name: asOf
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Employee training status
        '403':
          description: Employee is outside actor scope
components:
  parameters:
    RequirementId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RequirementFormRequest:
      type: object
      required: [code, name, requiredHours, cycleYears, effectiveFrom]
      properties:
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 255
        requiredHours:
          type: number
          minimum: 0
          maximum: 500
        cycleYears:
          type: integer
          minimum: 1
        jobPositionId:
          type: integer
          format: int64
          nullable: true
        departmentId:
          type: integer
          format: int64
          nullable: true
        professionalFieldId:
          type: integer
          format: int64
          nullable: true
        warningThresholdHours:
          type: number
          minimum: 0
          nullable: true
        effectiveFrom:
          type: string
          format: date
        effectiveTo:
          type: string
          format: date
          nullable: true
        active:
          type: boolean
        version:
          type: integer
          format: int64
          nullable: true
    RequirementStatusRequest:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
        version:
          type: integer
          format: int64
          nullable: true
    ComplianceStatus:
      type: string
      enum: [NOT_CONFIGURED, COMPLIANT, AT_RISK, NON_COMPLIANT]
