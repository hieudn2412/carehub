openapi: 3.0.3
info:
  title: CareHub Training Records Phase 06 API
  version: phase06
paths:
  /api/v1/training/employees/status:
    get:
      summary: List employee training hour compliance summaries
      description: Manager/Admin employee training hours list for screen 20.
      security:
        - bearerAuth: []
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
        - name: departmentId
          in: query
          schema:
            type: integer
            format: int64
        - name: jobPositionId
          in: query
          schema:
            type: integer
            format: int64
        - name: professionalFieldId
          in: query
          schema:
            type: integer
            format: int64
        - name: complianceStatus
          in: query
          schema:
            $ref: '#/components/schemas/ComplianceStatus'
        - name: hasPendingReview
          in: query
          schema:
            type: boolean
        - name: approvedHoursMin
          in: query
          schema:
            type: number
        - name: approvedHoursMax
          in: query
          schema:
            type: number
        - name: requirementConfigured
          in: query
          schema:
            type: boolean
        - name: asOf
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            example: employeeCode,asc
      responses:
        '200':
          description: Employee training status page
        '403':
          description: Manager/Admin role required
  /api/v1/training/employees/{employeeId}/records:
    get:
      summary: List employee training hour ledger records
      description: Screen 21 ledger for approved, pending, and rejected records in the selected compliance window.
      security:
        - bearerAuth: []
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: professionalFieldId
          in: query
          schema:
            type: integer
            format: int64
        - name: asOf
          in: query
          schema:
            type: string
            format: date
        - name: workflowStatus
          in: query
          schema:
            type: string
            enum: [APPROVED, PENDING_REVIEW, REJECTED]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            example: startDate,desc
      responses:
        '200':
          description: Employee ledger page
        '403':
          description: Employee is outside actor scope
        '404':
          description: Employee not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ComplianceStatus:
      type: string
      enum: [NOT_CONFIGURED, COMPLIANT, AT_RISK, NON_COMPLIANT]
    EmployeeTrainingStatusSummary:
      type: object
      properties:
        employeeId:
          type: integer
          format: int64
        employeeCode:
          type: string
        employeeName:
          type: string
        departmentId:
          type: integer
          format: int64
          nullable: true
        departmentName:
          type: string
          nullable: true
        jobPositionId:
          type: integer
          format: int64
          nullable: true
        jobPositionName:
          type: string
          nullable: true
        requirementId:
          type: integer
          format: int64
          nullable: true
        requirementName:
          type: string
          nullable: true
        requiredHours:
          type: number
        approvedHours:
          type: number
        pendingHours:
          type: number
        rejectedHours:
          type: number
        remainingHours:
          type: number
        complianceStatus:
          $ref: '#/components/schemas/ComplianceStatus'
        lastTrainingDate:
          type: string
          format: date
          nullable: true
        pendingReviewCount:
          type: integer
          format: int64
    EmployeeTrainingRecordLedger:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        activityTypeName:
          type: string
        startDate:
          type: string
          format: date
        declaredHours:
          type: number
        approvedHours:
          type: number
          nullable: true
        runningApprovedHours:
          type: number
        workflowStatus:
          type: string
          enum: [APPROVED, PENDING_REVIEW, REJECTED]
        evidenceCount:
          type: integer
          format: int64
        passedEvidenceCount:
          type: integer
          format: int64
        failedEvidenceCount:
          type: integer
          format: int64
        reviewCount:
          type: integer
          format: int64
        changeLogCount:
          type: integer
          format: int64
