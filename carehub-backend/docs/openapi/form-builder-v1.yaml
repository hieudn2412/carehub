openapi: 3.1.0
info:
  title: CareHub Form Builder API
  version: 1.0.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: |
    API v1 for creating, assigning, completing, and scoring versioned forms. Builder/import/assignment
    administration requires `ADMIN`; assigned-form and draft/submit operations require `MANAGER`.
    Published versions are immutable. Creating a draft without `sections` clones the current published version.
    Breaking changes will be introduced under `/api/v2`; v1 will receive deprecation and sunset headers before retirement.
servers:
  - url: /api/v1
tags:
  - name: Form Builder
    description: Versioned form design and publication.
  - name: Form Preview
    description: Read-only form catalog and complete schemas for a Google Forms-style admin preview.
  - name: Form Assignment
    description: Admin assignment and manager assigned-form access.
  - name: Form Submission
    description: Manager draft, answer, submit, and result workflow.
security:
  - bearerAuth: []
paths:
  /forms:
    get:
      tags: [Form Builder]
      operationId: listForms
      summary: List forms
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: keyword
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/FormStatus' }
        - name: subjectType
          in: query
          schema: { $ref: '#/components/schemas/SubjectType' }
        - name: ownerDepartmentId
          in: query
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Paginated forms
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormPageEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    post:
      tags: [Form Builder]
      operationId: createForm
      summary: Create form metadata
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFormRequest' }
            example:
              code: SAFETY-ROUND
              title: Daily safety round
              subjectType: ROOM
              ownerDepartmentId: 12
      responses:
        '201':
          description: Form created
          headers:
            Location:
              schema: { type: string, format: uri }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /forms/{formId}:
    parameters:
      - $ref: '#/components/parameters/FormId'
    get:
      tags: [Form Builder]
      operationId: getForm
      summary: Get form metadata
      responses:
        '200':
          description: Form found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Form Builder]
      operationId: updateForm
      summary: Update form metadata
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateFormRequest' }
      responses:
        '200':
          description: Form updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Form Builder]
      operationId: retireForm
      summary: Soft-delete and retire a form
      responses:
        '204': { description: Form retired }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /forms/{formId}/versions:
    parameters:
      - $ref: '#/components/parameters/FormId'
    get:
      tags: [Form Builder]
      operationId: listFormVersions
      summary: List versions of a form
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/VersionStatus' }
      responses:
        '200':
          description: Paginated versions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionPageEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    post:
      tags: [Form Builder]
      operationId: createFormVersion
      summary: Create the single editable draft
      description: |
        If `sourceVersionId` is supplied, its structure is cloned. Otherwise the current published version is cloned.
        Supplying `sections` replaces the cloned structure; an explicit empty array creates a blank draft.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveVersionRequest' }
            examples:
              cloneCurrent:
                value: {}
              createStructure:
                value:
                  title: Safety round v1
                  settings: { scoringEnabled: true }
                  sections:
                    - title: Assessment
                      displayOrder: 0
                      items: []
      responses:
        '201':
          description: Draft created
          headers:
            Location:
              schema: { type: string, format: uri }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /forms/{formId}/versions/{versionId}:
    parameters:
      - $ref: '#/components/parameters/FormId'
      - $ref: '#/components/parameters/VersionId'
    get:
      tags: [Form Builder]
      operationId: getFormVersion
      summary: Get a complete versioned form schema
      responses:
        '200':
          description: Version found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Form Builder]
      operationId: updateFormVersion
      summary: Replace an editable draft schema
      description: "`lockVersion` is required and must match the latest response."
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveVersionRequest' }
      responses:
        '200':
          description: Draft updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Form Builder]
      operationId: deleteFormDraft
      summary: Delete a draft version
      responses:
        '204': { description: Draft deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /forms/{formId}/versions/{versionId}/publication:
    parameters:
      - $ref: '#/components/parameters/FormId'
      - $ref: '#/components/parameters/VersionId'
    post:
      tags: [Form Builder]
      operationId: publishFormVersion
      summary: Publish a draft
      description: Validates the complete schema, publishes the draft, and retires the previous published version atomically.
      responses:
        '200':
          description: Version published
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /form-import-batches:
    get:
      tags: [Form Builder]
      operationId: listFormImportBatches
      summary: List Google Form import batches
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Paginated import batches
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Form Builder]
      operationId: previewGoogleFormImport
      summary: Fetch, normalize, and validate public Google Forms
      description: Admin only. The feature flag must be enabled. This operation never publishes forms.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FormImportRequest' }
      responses:
        '202':
          description: Preview completed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormImportBatchEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /form-import-batches/{batchId}:
    get:
      tags: [Form Builder]
      operationId: getFormImportBatch
      summary: Get a batch with per-form preview results
      parameters:
        - name: batchId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Import batch found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormImportBatchEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
  /form-import-batches/{batchId}/application:
    post:
      tags: [Form Builder]
      operationId: applyFormImportBatch
      summary: Create or update draft forms from a validated batch
      parameters:
        - name: batchId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '202':
          description: Eligible rows applied; no form is published
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormImportBatchEnvelope' }
        '409': { $ref: '#/components/responses/Conflict' }
  /form-subjects/users:
    get:
      tags: [Form Builder]
      operationId: findFormSubjectUser
      summary: Resolve an active employee for form evaluation
      description: ADMIN may search globally. MANAGER must own the active assignment item and may search across departments.
      parameters:
        - name: assignmentItemId
          in: query
          required: false
          description: Required for MANAGER; optional for ADMIN.
          schema: { type: integer, format: int64 }
        - name: employeeCode
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 100 }
      responses:
        '200':
          description: Employee found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormSubjectUserEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /form-assignments:
    get:
      tags: [Form Assignment]
      operationId: listFormAssignments
      summary: List assignments (ADMIN)
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: managerId
          in: query
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Paginated assignments
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormAssignmentPageEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Form Assignment]
      operationId: createFormAssignment
      summary: Assign published form versions to a manager (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFormAssignmentRequest' }
            example:
              managerId: 15
              validFrom: '2026-06-21T00:00:00Z'
              validUntil: null
              formVersionIds: [10, 12]
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormAssignmentEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /forms/{formId}/assignments:
    get:
      tags: [Form Assignment]
      operationId: listFormManagerAssignments
      summary: List manager assignments for one form (ADMIN)
      parameters:
        - name: formId
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/FormAssignmentStatus'
          example: ACTIVE
          description: Defaults to ACTIVE when omitted.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Paginated manager assignments for the form
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormManagerAssignmentPageEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /form-assignments/{assignmentId}:
    parameters:
      - name: assignmentId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Form Assignment]
      operationId: getFormAssignment
      summary: Get assignment detail (ADMIN)
      responses:
        '200':
          description: Assignment found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormAssignmentEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Form Assignment]
      operationId: revokeFormAssignment
      summary: Revoke an assignment and all active items (ADMIN)
      responses:
        '204': { description: Assignment revoked }
        '404': { $ref: '#/components/responses/NotFound' }
  /form-assignment-items/{assignmentItemId}:
    delete:
      tags: [Form Assignment]
      operationId: revokeFormAssignmentItem
      summary: Revoke one assigned form (ADMIN)
      parameters:
        - $ref: '#/components/parameters/AssignmentItemId'
      responses:
        '204': { description: Assignment item revoked }
        '404': { $ref: '#/components/responses/NotFound' }
  /assigned-forms:
    get:
      tags: [Form Assignment]
      operationId: listAssignedForms
      summary: List current manager's active assigned forms
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Paginated assigned forms
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AssignedFormPageEnvelope' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /assigned-forms/{assignmentItemId}:
    get:
      tags: [Form Assignment]
      operationId: getAssignedForm
      summary: Get pinned renderable version for an active assignment item
      parameters:
        - $ref: '#/components/parameters/AssignmentItemId'
      responses:
        '200':
          description: Assigned form found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AssignedFormEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
  /form-submissions:
    get:
      tags: [Form Submission]
      operationId: listFormSubmissions
      summary: List own submissions (MANAGER) or all submissions (ADMIN)
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/FormSubmissionStatus' }
      responses:
        '200':
          description: Paginated submissions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormSubmissionPageEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Form Submission]
      operationId: createFormSubmissionDraft
      summary: Create a manager-owned draft
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFormSubmissionRequest' }
            example:
              assignmentItemId: 125
              subject: { type: USER, employeeCode: NV001 }
      responses:
        '201':
          description: Draft created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormSubmissionEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /form-submissions/{submissionId}:
    parameters:
      - name: submissionId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Form Submission]
      operationId: getFormSubmission
      summary: Get submission detail
      responses:
        '200':
          description: Submission found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormSubmissionEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Form Submission]
      operationId: replaceFormSubmissionAnswers
      summary: Replace all answers in an owned draft
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateFormSubmissionRequest' }
      responses:
        '200':
          description: Draft updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormSubmissionEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Form Submission]
      operationId: cancelFormSubmissionDraft
      summary: Void an owned draft
      responses:
        '204': { description: Draft voided }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /form-submissions/{submissionId}/submission:
    post:
      tags: [Form Submission]
      operationId: submitFormSubmission
      summary: Validate, score, and make an owned draft immutable
      parameters:
        - name: submissionId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lockVersion]
              properties:
                lockVersion: { type: integer, format: int64, minimum: 0 }
      responses:
        '200':
          description: Submission completed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormSubmissionEnvelope' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /form-previews:
    get:
      tags: [Form Preview]
      operationId: listFormPreviews
      summary: List forms available to the preview interface
      description: |
        ADMIN only. Each item contains the preferred preview version: the newest DRAFT,
        otherwise the newest PUBLISHED version, otherwise the newest remaining version.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: keyword
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/FormStatus' }
        - name: subjectType
          in: query
          schema: { $ref: '#/components/schemas/SubjectType' }
        - name: ownerDepartmentId
          in: query
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Paginated preview catalog
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormPreviewPageEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /form-previews/{formId}:
    get:
      tags: [Form Preview]
      operationId: getFormPreview
      summary: Get the complete schema used to render one form
      description: |
        Returns form metadata plus ordered sections, content blocks, questions, validation,
        display configuration and options. When `versionId` is omitted the preferred preview
        version is selected using the same rule as the list endpoint.
      parameters:
        - $ref: '#/components/parameters/FormId'
        - name: versionId
          in: query
          required: false
          description: View this exact version instead of the preferred preview version.
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Complete renderable form schema
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FormPreviewEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    FormId:
      name: formId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    VersionId:
      name: versionId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    AssignmentItemId:
      name: assignmentItemId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
    Size:
      name: size
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Sort:
      name: sort
      in: query
      description: Repeatable `property,direction` parameter.
      schema: { type: array, items: { type: string } }
      style: form
      explode: true
  schemas:
    FormStatus:
      type: string
      enum: [DRAFT, PUBLISHED, RETIRED]
    VersionStatus:
      type: string
      enum: [DRAFT, PUBLISHED, RETIRED]
    SubjectType:
      type: string
      enum: [USER, PATIENT, PROCESS, ROOM, DEPARTMENT]
    ItemType:
      type: string
      enum: [QUESTION, TITLE_DESCRIPTION, IMAGE, INSTRUCTION]
    FieldType:
      type: string
      enum: [SHORT_TEXT, LONG_TEXT, NUMBER, SINGLE_CHOICE, MULTIPLE_CHOICE, DROPDOWN, BOOLEAN, LINEAR_SCALE, DATE, TIME, DATETIME, FILE_UPLOAD, USER_REF, DEPARTMENT_REF, POSITION_REF, EDUCATION_LEVEL_REF, PATIENT_REF, CALCULATED]
    FormImportRequest:
      type: object
      required: [forms]
      properties:
        forms:
          type: array
          minItems: 1
          maxItems: 25
          items:
            type: object
            required: [code, sourceUrl, displayOrder]
            properties:
              code: { type: string, pattern: '^[A-Za-z0-9_-]+$', minLength: 2, maxLength: 50 }
              sourceUrl: { type: string, format: uri, maxLength: 2000 }
              displayOrder: { type: integer, minimum: 0 }
    FormImportBatch:
      type: object
      required: [id, status, totalForms, successForms, failedForms, warningForms, rows]
      properties:
        id: { type: integer, format: int64 }
        status:
          type: string
          enum: [PENDING, PROCESSING, VALIDATED, PARTIAL, FAILED, APPLYING, APPLIED, APPLIED_PARTIAL]
        totalForms: { type: integer, minimum: 0 }
        successForms: { type: integer, minimum: 0 }
        failedForms: { type: integer, minimum: 0 }
        warningForms: { type: integer, minimum: 0 }
        importedByUserId: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
        appliedAt: { type: string, format: date-time }
        rows:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64 }
              displayOrder: { type: integer }
              code: { type: string }
              sourceFormId: { type: string }
              sourceUrl: { type: string, format: uri }
              sourceTitle: { type: string }
              sourceHash: { type: string, pattern: '^[a-f0-9]{64}$' }
              status:
                type: string
                enum: [PENDING, READY, WARNING, BLOCKED, IMPORTED, SKIPPED, CONFLICT, FAILED]
              messages: { type: array, items: { type: object, additionalProperties: true } }
              normalizedSchema: { type: object, additionalProperties: true }
              formId: { type: integer, format: int64 }
              versionId: { type: integer, format: int64 }
    FormImportBatchEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data: { $ref: '#/components/schemas/FormImportBatch' }
    FormSubjectUserEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data:
          type: object
          required: [employeeCode, fullName]
          properties:
            employeeCode: { type: string }
            fullName: { type: string }
            position: { type: [string, 'null'] }
            department: { type: [string, 'null'] }
    FormAssignmentStatus:
      type: string
      enum: [ACTIVE, REVOKED, EXPIRED]
    CreateFormAssignmentRequest:
      type: object
      required: [managerId, formVersionIds]
      properties:
        managerId: { type: integer, format: int64 }
        validFrom: { type: [string, 'null'], format: date-time }
        validUntil: { type: [string, 'null'], format: date-time }
        formVersionIds:
          type: array
          minItems: 1
          maxItems: 25
          uniqueItems: true
          items: { type: integer, format: int64 }
    FormAssignment:
      type: object
      required: [id, manager, assignedBy, assignedAt, status, items]
      properties:
        id: { type: integer, format: int64 }
        manager: { $ref: '#/components/schemas/AssignmentUser' }
        assignedBy: { $ref: '#/components/schemas/AssignmentUser' }
        assignedAt: { type: string, format: date-time }
        validFrom: { type: [string, 'null'], format: date-time }
        validUntil: { type: [string, 'null'], format: date-time }
        revokedAt: { type: [string, 'null'], format: date-time }
        status: { $ref: '#/components/schemas/FormAssignmentStatus' }
        items:
          type: array
          items: { $ref: '#/components/schemas/FormAssignmentItem' }
    AssignmentUser:
      type: object
      required: [id, employeeCode, fullName]
      properties:
        id: { type: integer, format: int64 }
        employeeCode: { type: string }
        fullName: { type: string }
    FormAssignmentItem:
      type: object
      required: [assignmentItemId, formId, formCode, title, formVersionId, versionNumber, status]
      properties:
        assignmentItemId: { type: integer, format: int64 }
        formId: { type: integer, format: int64 }
        formCode: { type: string }
        title: { type: string }
        formVersionId: { type: integer, format: int64 }
        versionNumber: { type: integer }
        status: { $ref: '#/components/schemas/FormAssignmentStatus' }
    FormManagerAssignment:
      type: object
      required: [assignmentId, assignmentItemId, manager, assignedBy, assignedAt, assignmentStatus, effectiveStatus, itemStatus, formVersionId, versionNumber, title]
      properties:
        assignmentId: { type: integer, format: int64 }
        assignmentItemId: { type: integer, format: int64 }
        manager: { $ref: '#/components/schemas/AssignmentUser' }
        assignedBy: { $ref: '#/components/schemas/AssignmentUser' }
        assignedAt: { type: string, format: date-time }
        validFrom: { type: [string, 'null'], format: date-time }
        validUntil: { type: [string, 'null'], format: date-time }
        revokedAt: { type: [string, 'null'], format: date-time }
        assignmentStatus: { $ref: '#/components/schemas/FormAssignmentStatus' }
        effectiveStatus: { $ref: '#/components/schemas/FormAssignmentStatus' }
        itemStatus: { $ref: '#/components/schemas/FormAssignmentStatus' }
        formVersionId: { type: integer, format: int64 }
        versionNumber: { type: integer }
        title: { type: string }
    AssignedForm:
      type: object
      required: [assignmentItemId, formId, formCode, title]
      properties:
        assignmentItemId: { type: integer, format: int64 }
        formId: { type: integer, format: int64 }
        formCode: { type: string }
        title: { type: string }
        validFrom: { type: [string, 'null'], format: date-time }
        validUntil: { type: [string, 'null'], format: date-time }
        version:
          anyOf:
            - $ref: '#/components/schemas/Version'
            - type: 'null'
    FormSubmissionStatus:
      type: string
      enum: [DRAFT, SUBMITTED, VOIDED]
    FormScoringStatus:
      type: string
      enum: [NOT_CONFIGURED, CALCULATED]
    FormSubmissionResult:
      type: [string, 'null']
      enum: [PASSED, FAILED_SCORE, FAILED_CRITICAL, null]
    CreateFormSubmissionRequest:
      type: object
      required: [assignmentItemId, subject]
      properties:
        assignmentItemId: { type: integer, format: int64 }
        subject:
          type: object
          required: [type, employeeCode]
          properties:
            type: { type: string, const: USER }
            employeeCode: { type: string, minLength: 1, maxLength: 100 }
    UpdateFormSubmissionRequest:
      type: object
      required: [lockVersion, answers]
      properties:
        lockVersion: { type: integer, format: int64, minimum: 0 }
        answers:
          type: array
          items: { $ref: '#/components/schemas/FormAnswerRequest' }
    FormAnswerRequest:
      type: object
      required: [questionKey]
      properties:
        questionKey: { type: string, format: uuid }
        optionKey: { type: string, format: uuid }
        optionKeys:
          type: array
          uniqueItems: true
          items: { type: string, format: uuid }
        textValue: { type: string, maxLength: 10000 }
        numberValue: { type: number }
        dateValue: { type: string, format: date }
        timeValue: { type: string, format: time }
    FormSubmission:
      type: object
      required: [id, assignmentItemId, formId, formCode, formVersionId, versionNumber, title, status, subject, scoringStatus, criticalFailure, answers, lockVersion]
      properties:
        id: { type: integer, format: int64 }
        assignmentItemId: { type: integer, format: int64 }
        formId: { type: integer, format: int64 }
        formCode: { type: string }
        formVersionId: { type: integer, format: int64 }
        versionNumber: { type: integer }
        title: { type: string }
        status: { $ref: '#/components/schemas/FormSubmissionStatus' }
        subject:
          type: object
          required: [type, employeeCode, fullName]
          properties:
            type: { type: string, const: USER }
            employeeCode: { type: string }
            fullName: { type: string }
            position: { type: [string, 'null'] }
            department: { type: [string, 'null'] }
        scoringStatus: { $ref: '#/components/schemas/FormScoringStatus' }
        result: { $ref: '#/components/schemas/FormSubmissionResult' }
        totalScore: { type: [number, 'null'] }
        maxScore: { type: [number, 'null'] }
        passingScore: { type: [number, 'null'] }
        convertedScore: { type: [number, 'null'] }
        criticalFailure: { type: boolean }
        scoreBreakdown:
          type: array
          items: { $ref: '#/components/schemas/FormScoreBreakdown' }
        answers:
          type: array
          items:
            type: object
            required: [questionKey, value]
            properties:
              questionKey: { type: string, format: uuid }
              optionKey: { type: [string, 'null'], format: uuid }
              value: { type: object, additionalProperties: true }
        lockVersion: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: [string, 'null'], format: date-time }
        submittedAt: { type: [string, 'null'], format: date-time }
    FormScoreBreakdown:
      type: object
      required: [questionKey, code, title, critical, baseScore, weight, weightedScore, maxScore]
      properties:
        questionKey: { type: string, format: uuid }
        code: { type: string }
        title: { type: string }
        critical: { type: boolean }
        baseScore: { type: number }
        weight: { type: number }
        weightedScore: { type: number }
        maxScore: { type: number }
    FormAssignmentEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data: { $ref: '#/components/schemas/FormAssignment' }
    FormAssignmentPageEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data:
          allOf:
            - $ref: '#/components/schemas/PageMetadata'
            - type: object
              properties:
                content: { type: array, items: { $ref: '#/components/schemas/FormAssignment' } }
    FormManagerAssignmentPageEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data:
          allOf:
            - $ref: '#/components/schemas/PageMetadata'
            - type: object
              properties:
                content: { type: array, items: { $ref: '#/components/schemas/FormManagerAssignment' } }
    AssignedFormEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data: { $ref: '#/components/schemas/AssignedForm' }
    AssignedFormPageEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data:
          allOf:
            - $ref: '#/components/schemas/PageMetadata'
            - type: object
              properties:
                content: { type: array, items: { $ref: '#/components/schemas/AssignedForm' } }
    FormSubmissionEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data: { $ref: '#/components/schemas/FormSubmission' }
    FormSubmissionPageEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data:
          allOf:
            - $ref: '#/components/schemas/PageMetadata'
            - type: object
              properties:
                content: { type: array, items: { $ref: '#/components/schemas/FormSubmission' } }
    CreateFormRequest:
      type: object
      required: [code, title, subjectType]
      properties:
        code: { type: string, minLength: 2, maxLength: 50, pattern: '^\s*[A-Za-z0-9_-]+\s*$', example: SAFETY-ROUND }
        title: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, maxLength: 4000 }
        subjectType: { $ref: '#/components/schemas/SubjectType' }
        ownerDepartmentId: { type: integer, format: int64 }
    UpdateFormRequest:
      type: object
      required: [title, subjectType]
      properties:
        title: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, maxLength: 4000 }
        subjectType: { $ref: '#/components/schemas/SubjectType' }
        ownerDepartmentId: { type: integer, format: int64 }
    SaveVersionRequest:
      type: object
      properties:
        sourceVersionId: { type: integer, format: int64, description: Creation only. }
        title: { type: string, maxLength: 255 }
        description: { type: string, maxLength: 4000 }
        settings: { type: object, additionalProperties: true }
        sections:
          type: array
          items: { $ref: '#/components/schemas/SectionRequest' }
        lockVersion: { type: integer, format: int64, minimum: 0, description: Required for update. }
    SectionRequest:
      type: object
      required: [title, displayOrder, items]
      properties:
        sectionKey: { type: string, format: uuid, description: Generated when omitted. }
        title: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, maxLength: 4000 }
        displayOrder: { type: integer, minimum: 0 }
        items:
          type: array
          items: { $ref: '#/components/schemas/ItemRequest' }
    ItemRequest:
      type: object
      required: [itemType, displayOrder]
      properties:
        itemKey: { type: string, format: uuid, description: Generated when omitted. }
        itemType: { $ref: '#/components/schemas/ItemType' }
        displayOrder: { type: integer, minimum: 0 }
        title: { type: string, maxLength: 255 }
        description: { type: string, maxLength: 4000 }
        mediaUrl: { type: string, maxLength: 2000 }
        question: { $ref: '#/components/schemas/QuestionRequest' }
    QuestionRequest:
      type: object
      required: [code, title, fieldType]
      properties:
        questionKey: { type: string, format: uuid, description: Generated when omitted. }
        code: { type: string, minLength: 1, maxLength: 100 }
        metricCode: { type: string, maxLength: 100 }
        title: { type: string, minLength: 1, maxLength: 2000 }
        helpText: { type: string, maxLength: 4000 }
        fieldType: { $ref: '#/components/schemas/FieldType' }
        required: { type: boolean, default: false }
        readOnly: { type: boolean, default: false }
        critical: { type: boolean, default: false }
        excludeFromScore: { type: boolean, default: false }
        weight: { type: number, exclusiveMinimum: 0 }
        validationConfig: { type: object, additionalProperties: true }
        displayConfig: { type: object, additionalProperties: true }
        options:
          type: array
          items: { $ref: '#/components/schemas/OptionRequest' }
    OptionRequest:
      type: object
      required: [value, label, displayOrder]
      properties:
        optionKey: { type: string, format: uuid, description: Generated when omitted. }
        value: { type: string, minLength: 1, maxLength: 255 }
        label: { type: string, minLength: 1, maxLength: 1000 }
        scoreValue: { type: number }
        compliant: { type: boolean }
        excludeFromDenominator: { type: boolean, default: false }
        displayOrder: { type: integer, minimum: 0 }
    Form:
      allOf:
        - $ref: '#/components/schemas/CreateFormRequest'
        - type: object
          required: [id, status, createdAt]
          properties:
            id: { type: integer, format: int64, readOnly: true }
            status: { $ref: '#/components/schemas/FormStatus' }
            ownerDepartment: { type: object, additionalProperties: true }
            currentPublishedVersion: { type: object, additionalProperties: true }
            createdAt: { type: string, format: date-time, readOnly: true }
            updatedAt: { type: string, format: date-time, readOnly: true }
    VersionSummary:
      type: object
      required: [id, versionNumber, status, lockVersion]
      properties:
        id: { type: integer, format: int64 }
        versionNumber: { type: integer, minimum: 1 }
        status: { $ref: '#/components/schemas/VersionStatus' }
        title: { type: string }
        schemaHash: { type: string, pattern: '^[a-f0-9]{64}$' }
        publishedAt: { type: string, format: date-time }
        lockVersion: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Version:
      allOf:
        - $ref: '#/components/schemas/VersionSummary'
        - type: object
          required: [formId, sections]
          properties:
            formId: { type: integer, format: int64 }
            description: { type: string }
            settings: { type: object, additionalProperties: true }
            publishedBy: { type: object, additionalProperties: true }
            sections:
              type: array
              items: { $ref: '#/components/schemas/SectionResponse' }
    FormPreviewSummary:
      allOf:
        - $ref: '#/components/schemas/Form'
        - type: object
          properties:
            previewVersion:
              $ref: '#/components/schemas/VersionSummary'
    FormPreviewDetail:
      type: object
      required: [form, version]
      properties:
        form: { $ref: '#/components/schemas/Form' }
        version: { $ref: '#/components/schemas/Version' }
    SectionResponse:
      allOf:
        - $ref: '#/components/schemas/SectionRequest'
        - type: object
          required: [id, sectionKey]
          properties:
            id: { type: integer, format: int64 }
            items:
              type: array
              items: { $ref: '#/components/schemas/ItemResponse' }
    ItemResponse:
      allOf:
        - $ref: '#/components/schemas/ItemRequest'
        - type: object
          required: [id, itemKey]
          properties:
            id: { type: integer, format: int64 }
            question: { $ref: '#/components/schemas/QuestionResponse' }
    QuestionResponse:
      allOf:
        - $ref: '#/components/schemas/QuestionRequest'
        - type: object
          required: [id, questionKey]
          properties:
            id: { type: integer, format: int64 }
            options:
              type: array
              items: { $ref: '#/components/schemas/OptionResponse' }
    OptionResponse:
      allOf:
        - $ref: '#/components/schemas/OptionRequest'
        - type: object
          required: [id, optionKey]
          properties:
            id: { type: integer, format: int64 }
    PageMetadata:
      type: object
      required: [page, size, totalElements, totalPages, content, sort]
      properties:
        page: { type: integer }
        size: { type: integer }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        sort: { type: array, items: { type: string } }
        content: { type: array, items: {} }
    FormPageEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data:
          allOf:
            - $ref: '#/components/schemas/PageMetadata'
            - type: object
              properties:
                content: { type: array, items: { $ref: '#/components/schemas/Form' } }
    VersionPageEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data:
          allOf:
            - $ref: '#/components/schemas/PageMetadata'
            - type: object
              properties:
                content: { type: array, items: { $ref: '#/components/schemas/VersionSummary' } }
    FormPreviewPageEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data:
          allOf:
            - $ref: '#/components/schemas/PageMetadata'
            - type: object
              properties:
                content: { type: array, items: { $ref: '#/components/schemas/FormPreviewSummary' } }
    FormPreviewEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data: { $ref: '#/components/schemas/FormPreviewDetail' }
    FormEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data: { $ref: '#/components/schemas/Form' }
    VersionEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success: { type: boolean, const: true }
        message: { type: string }
        data: { $ref: '#/components/schemas/Version' }
    Error:
      type: object
      required: [error_code, message, correlation_id]
      properties:
        error_code: { type: string, example: VAL_001 }
        message: { type: string, example: Validation failed }
        correlation_id: { type: string, format: uuid }
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
  responses:
    BadRequest:
      description: Invalid request or disabled Google public import
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: ADMIN role required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Form, version, or referenced department not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Duplicate code, existing draft, stale lock version, or immutable published version
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Request or form schema validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: Rate limit enforced by the deployment gateway
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
