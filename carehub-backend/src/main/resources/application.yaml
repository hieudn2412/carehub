server:
  port: ${SERVER_PORT:8081}

app:
  notification:
    seed-enabled: ${APP_NOTIFICATION_SEED_ENABLED:true}
    scheduling-enabled: ${APP_NOTIFICATION_SCHEDULING_ENABLED:true}
    scan-cron: ${APP_NOTIFICATION_SCAN_CRON:0 0 7 * * *}
    zone: ${APP_NOTIFICATION_ZONE:Asia/Bangkok}

  form-import:
    max-batch-size: 25
    google-public:
      enabled: ${GOOGLE_PUBLIC_FORM_IMPORT_ENABLED:true}
      connect-timeout: 5s
      read-timeout: 20s
      max-response-bytes: 5242880

  import:
    default-password: ${DEFAULT_PASSWORD:ChangeMe123@}

  api-prefix: /api/v1
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
      - https://api.fpthub.online
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7
  seed:
    enabled: ${APP_SEED_ENABLED:true}
    admin:
      employee-code: ${ADMIN_EMPLOYEE_CODE}
      email: ${ADMIN_EMAIL}
      password: ${ADMIN_PASSWORD}
      name: ${ADMIN_NAME}
    question-bank:
      enabled: ${APP_SEED_QUESTION_BANK_ENABLED:true}
      resource: ${APP_SEED_QUESTION_BANK_RESOURCE:classpath:question-bank/hospital-review-questions.json}

ai:
  generation:
    provider: ${GENERATION_PROVIDER:api}
    api-base-url: ${GENERATION_API_BASE_URL:https://api.deepseek.com}
    api-key: ${GENERATION_API_KEY:${DEEPSEEK_API_KEY:}}
    model: ${GENERATION_MODEL:deepseek-v4-flash}
    fallback-model: ${GENERATION_FALLBACK_MODEL:deepseek-v4-pro}
    prompt-version: ${GENERATION_PROMPT_VERSION:docgen-mvp-flash-v1}
    pipeline-mode: ${GENERATION_PIPELINE_MODE:single_call}
    timeout-seconds: ${GENERATION_TIMEOUT_SECONDS:60}
    connect-timeout-seconds: ${GENERATION_CONNECT_TIMEOUT_SECONDS:10}
    max-connections: ${GENERATION_MAX_CONNECTIONS:10}
    max-retries: ${GENERATION_MAX_RETRIES:1}
    max-concurrent-calls: ${GENERATION_MAX_CONCURRENT_CALLS:2}
    circuit-breaker-failure-threshold: ${GENERATION_CIRCUIT_BREAKER_FAILURE_THRESHOLD:5}
    circuit-breaker-cooldown-seconds: ${GENERATION_CIRCUIT_BREAKER_COOLDOWN_SECONDS:60}
    temperature: ${GENERATION_TEMPERATURE:0.2}
    max-output-tokens: ${GENERATION_MAX_OUTPUT_TOKENS:1800}
    llm-validation-enabled: ${GENERATION_LLM_VALIDATION_ENABLED:false}
    parallel-chunk-processing: ${GENERATION_PARALLEL_CHUNKS:true}
    chunk-parallelism: ${GENERATION_CHUNK_PARALLELISM:-1}
    input-price-per-million: ${GENERATION_INPUT_PRICE:0.14}
    output-price-per-million: ${GENERATION_OUTPUT_PRICE:0.56}
    fallback-input-price-per-million: ${GENERATION_FALLBACK_INPUT_PRICE:0.55}
    fallback-output-price-per-million: ${GENERATION_FALLBACK_OUTPUT_PRICE:2.20}

  training:
    records:
      review-enabled: ${TRAINING_RECORDS_REVIEW_ENABLED:false}
      max-edit-count: ${TRAINING_RECORDS_MAX_EDIT_COUNT:2}
  embedding:
    provider: ${EMBEDDING_PROVIDER:e5}
    model: ${EMBEDDING_MODEL:intfloat/multilingual-e5-small}
    dimension: ${EMBEDDING_DIMENSION:384}
    model-path: ${E5_MODEL_PATH:models/intfloat/multilingual-e5-small}
    preload: ${E5_PRELOAD:true}
    backfill-on-startup: ${E5_BACKFILL_ON_STARTUP:true}
    max-length: ${E5_MAX_LENGTH:512}
    timeout-seconds: ${E5_TIMEOUT_SECONDS:30}
    fallback-provider: ${E5_FALLBACK_PROVIDER:lexical}
    dedup-page-size: ${E5_DEDUP_PAGE_SIZE:500}
    lexical-page-size: ${E5_LEXICAL_PAGE_SIZE:500}
    cache-ttl-minutes: ${E5_CACHE_TTL_MINUTES:30}
    cache-warmup-enabled: ${E5_CACHE_WARMUP_ENABLED:true}
    ann-enabled: ${E5_ANN_ENABLED:true}
    ann-lsh-bits: ${E5_ANN_LSH_BITS:16}
    ann-search-k: ${E5_ANN_SEARCH_K:50}
    ann-neighbor-buckets: ${E5_ANN_NEIGHBOR_BUCKETS:true}
    batch-size: ${E5_BATCH_SIZE:32}
    batch-enabled: ${E5_BATCH_ENABLED:true}
    backfill-async: ${E5_BACKFILL_ASYNC:true}
    intra-op-threads: ${E5_INTRA_OP_THREADS:-1}
    inter-op-threads: ${E5_INTER_OP_THREADS:1}
  paraphrase:
    provider: ${PARAPHRASE_PROVIDER:mock}
    model: ${PARAPHRASE_MODEL:ngwgsang/vietquill-vit5-base-tsubaki}
    model-path: ${VIETQUILL_MODEL_PATH:models/ngwgsang/vietquill-vit5-base-tsubaki}
    preload: ${VIETQUILL_PRELOAD:false}
    max-input-length: ${VIETQUILL_MAX_INPUT_LENGTH:512}
    max-output-length: ${VIETQUILL_MAX_OUTPUT_LENGTH:128}
    timeout-seconds: ${VIETQUILL_TIMEOUT_SECONDS:60}
    num-beams: ${VIETQUILL_NUM_BEAMS:2}
    requested-count-default: ${VIETQUILL_REQUESTED_COUNT_DEFAULT:3}
    single-pass-enabled: ${VIETQUILL_SINGLE_PASS:true}
    pool-size: ${VIETQUILL_POOL_SIZE:2}
    acquire-timeout-ms: ${VIETQUILL_ACQUIRE_TIMEOUT_MS:30000}
    kv-cache-enabled: ${VIETQUILL_KV_CACHE_ENABLED:false}

document:
  storage-path: ${DOCUMENT_STORAGE_PATH:storage/documents}
  supported-file-types:
    - pdf
    - docx
    - txt
    - md
  questions-per-chunk: ${DOCUMENT_QUESTIONS_PER_CHUNK:1}
  chunk:
    target-tokens: ${DOCUMENT_CHUNK_TARGET_TOKENS:750}
    max-tokens: ${DOCUMENT_CHUNK_MAX_TOKENS:1200}
    overlap-tokens: ${DOCUMENT_CHUNK_OVERLAP_TOKENS:80}
    min-useful-text-length: ${DOCUMENT_CHUNK_MIN_USEFUL_TEXT_LENGTH:80}

validation:
  duplicate:
    strong-min: ${VALIDATION_DUPLICATE_STRONG_MIN:0.93}
    review-min: ${VALIDATION_DUPLICATE_REVIEW_MIN:0.80}
  quality:
    reject-min: ${VALIDATION_QUALITY_REJECT_MIN:0.55}

spring:
  devtools:
    restart:
      enabled: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  config:
    import:
      - optional:file:.env.properties
      - optional:file:env.properties

  rabbitmq:
    addresses: ${CLOUDAMQP_URL}
    connection-timeout: 10s
    requested-heartbeat: 30s
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/carehub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root123}
    hikari:
      data-source-properties:
        TimeZone: Asia/Ho_Chi_Minh
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
        batch_versioned_data: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
